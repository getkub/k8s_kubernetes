apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "linux-endpoints.fullname" . }}-config
  labels:
    {{- include "linux-endpoints.labels" . | nindent 4 }}
data:
  elastic-agent.yml: |
    id: {{ include "linux-endpoints.fullname" . }}-agent
    revision: 1
    
    # Standalone mode outputs
    outputs:
      default:
        type: elasticsearch
        hosts: {{ .Values.endpointConfig.elasticsearch.hosts }}
        username: {{ .Values.endpointConfig.elasticsearch.username }}
        password: "${ELASTIC_PASSWORD}"
        ssl.certificate_authorities: ["/etc/ssl/certs/elasticsearch-ca.crt"]
    
    # Inputs for basic Linux logs (acting like endpoints)
    inputs:
      - id: log-system-auth
        type: log
        use_output: default
        data_stream:
          namespace: default
          dataset: system.auth
        paths:
          {{- if .Values.endpointConfig.collection.authLogs }}
          - /var/log/auth.log
          {{- end }}
          
      - id: log-system-syslog
        type: log
        use_output: default
        data_stream:
          namespace: default
          dataset: system.syslog
        paths:
          {{- if .Values.endpointConfig.collection.systemLogs }}
          - /var/log/syslog
          {{- end }}
